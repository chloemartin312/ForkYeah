<html lang="en">
<head>

  <style>
    /* ── Menu page nav bar ── */
    .menu-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.625rem;
      border-bottom: var(--border-thick) solid var(--red);
      gap: 1rem;
      flex-wrap: wrap;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      background: transparent;
      color: var(--red);
      font-family: var(--font);
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 0.1875rem solid var(--red);
      padding: 0.5em 1.1em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .back-btn:hover,
    .back-btn:focus-visible {
      background: var(--red);
      color: var(--text-on-red);
      outline: none;
    }

    .nav-brand {
      font-weight: 900;
      font-size: 1.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--red);
      line-height: 1;
    }

    /* ── visit website button ── */
    .visit-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      background: var(--red);
      color: var(--text-on-red);
      font-family: var(--font);
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 0.1875rem solid var(--red);
      padding: 0.5em 1.25em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .visit-btn:hover,
    .visit-btn:focus-visible {
      background: transparent;
      color: var(--red);
      outline: none;
    }

    /* ── header block ── */
    .header-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.35rem;
    }

    /* ── not-found state ── */
    .not-found {
      text-align: center;
      padding: 3rem 1rem;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
    }

    /* ── price badge ── */
    .price-badge {
      display: inline-block;
      font-family: var(--font);
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      border: 0.125rem dashed var(--red);
      padding: 0.25em 0.75em;
      margin-top: 0.5rem;
    }

    /* ── menu grid ── */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-top: 1rem;
    }

    /* ── menu section ── */
    .menu-section {
      border: var(--border-mid) solid var(--red);
      overflow: hidden;
    }

    .menu-section-title {
      background: var(--red);
      color: var(--text-on-red);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.5em 0.875em;
    }

    /* ── menu items ── */
    .menu-items {
      padding: 0.5rem 0;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.625rem 0.875rem;
      border-bottom: 1px dashed var(--gray);
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item-left {
      flex: 1;
      min-width: 0;
    }

    .menu-item-name {
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--red);
      line-height: 1.2;
    }

    .menu-item-desc {
      font-weight: 400;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      color: var(--red);
      opacity: 0.7;
      margin-top: 0.15rem;
      line-height: 1.35;
    }

    .menu-item-price {
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: var(--red);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── footer note ── */
    .menu-note {
      margin-top: 1.25rem;
      padding: 0.875rem 1rem;
      border: 0.125rem dashed var(--red);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--red);
      opacity: 0.75;
      text-align: center;
    }

    /* ── full menu CTA ── */
    .full-menu-cta {
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-family: var(--font);
      font-weight: 700;
      font-size: 1.375rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      text-decoration: none;
      padding: 0.625em 1em;
      border: var(--border-thick) solid var(--red);
      background: transparent;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .full-menu-cta:hover,
    .full-menu-cta:focus-visible {
      background: var(--red);
      color: var(--text-on-red);
      outline: none;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .menu-grid {
        grid-template-columns: 1fr;
        gap: 0.875rem;
      }

      .menu-nav {
        padding: 0.625rem 0.75rem;
      }

      .nav-brand {
        font-size: 1.25rem;
      }

      .visit-btn {
        font-size: 0.875rem;
        padding: 0.45em 0.875em;
      }

      .back-btn {
        font-size: 1rem;
        padding: 0.4em 0.875em;
      }

      .menu-section-title {
        font-size: 1.05rem;
      }

      .menu-item-name {
        font-size: 0.9rem;
      }

      .menu-item-desc {
        font-size: 0.8rem;
      }

      .full-menu-cta {
        font-size: 1rem;
        gap: 0.5rem;
      }
    }
  </style>
</head>

    const content  = document.getElementById('menu-content');
    const visitBtn = document.getElementById('visit-website-btn');

      visitBtn.href  = rest.website;
      visitBtn.setAttribute('aria-label', `Visit ${rest.name} website`);

      const priceLabel = ['Budget', 'Moderate', 'Upscale', 'Fine Dining'][priceCount - 1] || '';

                  <div class="menu-item-desc">${item.desc}</div>
                </div>
                <div class="menu-item-price" aria-label="${item.price}">${item.price}</div>
              </li>
            `).join('')}

        </div>
