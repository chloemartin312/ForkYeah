<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForkYeah — Restaurant Info</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* ── Nav bar ── */
    .info-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.625rem;
      border-bottom: var(--border-thick) solid var(--red);
      gap: 1rem;
      flex-wrap: wrap;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      background: transparent;
      color: var(--red);
      font-family: var(--font);
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 0.1875rem solid var(--red);
      padding: 0.5em 1.1em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .back-btn:hover,
    .back-btn:focus-visible {
      background: var(--red);
      color: var(--text-on-red);
      outline: none;
    }

    .nav-brand {
      font-weight: 900;
      font-size: 1.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--red);
      line-height: 1;
    }

    /* ── Header helpers ── */
    .header-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.35rem;
    }

    .price-badge {
      display: inline-block;
      font-family: var(--font);
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      border: 0.125rem dashed var(--red);
      padding: 0.25em 0.75em;
      margin-top: 0.25rem;
    }

    /* ── Info card grid ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-top: 1rem;
    }

    /* ── Info section block ── */
    .info-section {
      border: var(--border-mid) solid var(--red);
      overflow: hidden;
    }

    .info-section-title {
      background: var(--red);
      color: var(--text-on-red);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.5em 0.875em;
    }

    .info-section-body {
      padding: 0.875rem;
      font-family: var(--font);
      color: var(--red);
    }

    .info-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.55rem 0;
      border-bottom: 1px dashed var(--gray);
      align-items: flex-start;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-weight: 800;
      font-size: 0.875rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      flex-shrink: 0;
      min-width: 5.5rem;
      line-height: 1.3;
    }

    .info-value {
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      line-height: 1.4;
    }

    /* ── About section (full-width) ── */
    .about-section {
      border: var(--border-mid) solid var(--red);
      overflow: hidden;
      margin-top: 1.25rem;
    }

    .about-body {
      padding: 1rem;
      font-family: var(--font);
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      line-height: 1.55;
      color: var(--red);
    }

    /* ── Hero image ── */
    .info-hero {
      width: 100%;
      height: 14rem;
      overflow: hidden;
      border: var(--border-mid) solid var(--red);
      margin-top: 1rem;
    }

    .info-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Menu CTA ── */
    .menu-cta {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-family: var(--font);
      font-weight: 800;
      font-size: 1.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-on-red);
      text-decoration: none;
      padding: 0.75em 1em;
      background: var(--red);
      border: var(--border-thick) solid var(--red);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .menu-cta:hover,
    .menu-cta:focus-visible {
      background: transparent;
      color: var(--red);
      outline: none;
    }

    /* ── Visit website link ── */
    .visit-link {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      font-family: var(--font);
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      text-decoration: none;
      padding: 0.55em 1em;
      border: 0.1875rem solid var(--red);
      background: transparent;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .visit-link:hover {
      background: var(--red);
      color: var(--text-on-red);
    }

    /* ── Not found ── */
    .not-found {
      text-align: center;
      padding: 3rem 1rem;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .info-grid {
        grid-template-columns: 1fr;
        gap: 0.875rem;
      }
      .info-nav {
        padding: 0.625rem 0.75rem;
      }
      .nav-brand {
        font-size: 1.25rem;
      }
      .menu-cta {
        font-size: 1.25rem;
        gap: 0.5rem;
        padding: 0.65em 0.875em;
      }
      .info-hero {
        height: 10rem;
      }
    }
  </style>
</head>

<body>
  <section class="page-card" id="main-content">

    const content = document.getElementById('info-content');
